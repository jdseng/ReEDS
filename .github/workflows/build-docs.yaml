# this workflow sets up dependencies, builds the documentation, and updates the gh-pages branch
# the gh-pages branch is what's used for GitHub Pages

name: Documentation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on: 
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches:
      - main
  pull_request:
    branches:
      - main   

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for peaceiris/actions-gh-pages publish to gh-pages.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with: 
          fetch-depth: 1
          lfs: true
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with: 
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pandas \
            argparse \
            sphinx==7.2.6 \
            setuptools==80.9.0 \
            myst-parser==2.0.0 \
            sphinx_rtd_theme==2.0.0 \
            sphinxcontrib-bibtex==2.6.2 \
            sphinx_design==0.6.1

      - name: Set variables for internal github repo
        run: |
          echo "BASE_URL=https://github.com/ReEDS-Model/ReEDS" >> "$GITHUB_ENV"

      - name: Build Sphinx documentation
        env: 
          GAMSLICE: ${{ secrets.GAMSLICE }}
        run: sphinx-build docs/source docs/build/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build

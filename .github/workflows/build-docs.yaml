# this workflow sets up dependencies, builds the documentation, and updates the gh-pages branch
# the gh-pages branch is what's used for GitHub Pages

name: Documentation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on: 
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches:
      - main
  pull_request:
    branches:
      - main   

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for peaceiris/actions-gh-pages publish to gh-pages.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with: 
          fetch-depth: 1
          lfs: true
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with: 
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pandas \
            argparse \
            sphinx==7.2.6 \
            setuptools==80.9.0 \
            myst-parser==2.0.0 \
            sphinx_rtd_theme==2.0.0 \
            sphinxcontrib-bibtex==2.6.2 \
            sphinx_design==0.6.1

      - name: Set variables for internal github repo
        run: |
          echo "BASE_URL=https://github.com/ReEDS-Model/ReEDS" >> "$GITHUB_ENV"
          cd "$GITHUB_WORKSPACE/docs/source/documentation_tools/"
          sh generate_sources_md_file.sh
          cd "$GITHUB_WORKSPACE"
          python docs/source/documentation_tools/generate_markdown.py --githubURL "https://github.com/ReEDS-Model/ReEDS/blob/main" --reedsPath "$GITHUB_WORKSPACE"

      - name: Build Sphinx documentation
        env: 
          GAMSLICE: ${{ secrets.GAMSLICE }}
        run: sphinx-build docs/source docs/build/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build

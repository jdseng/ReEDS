# This Workflow creates caches for the Python and Julia environments every time
# someone merges a PR. Subsequent PRs reuse these caches if the dependency
# files have not changed.
name: update-cache

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

# To reset the CACHE, change the environment variable: CACHE_NUMBER.
# Either you increment the number or decrement it, but also reflect the changes
# on the other workflows that reutilize the Python environment
env:
  CACHE_NUMBER: 1

jobs:
  python-cache:
    name: Python Cache
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: mamba-org/setup-micromamba@add3a49764cedee8ee24e82dfde87f5bc2914462 # v2
        with:
          environment-file: environment.yml
          cache-environment: true
          post-cleanup: 'all'
          cache-environment-key: ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles('environment.yml') }}
        env:
          ACTIONS_STEP_DEBUG: true

  julia-cache:
    name: Julia Cache
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore Julia cache
        id: julia-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.julia
          key: julia-${{ runner.os }}-${{ hashFiles('Project.toml') }}
          restore-keys: julia-${{ runner.os }}-

      - uses: julia-actions/setup-julia@5c9647d97b78a5debe5164e9eec09d653d29bd71 # v2
        env:
          NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/nrel_ca_chain.crt

      - run: julia --project=. instantiate.jl

name: r2x-compatibility
description: "Action to run R2X."
inputs:
  reeds-run-path:
    required: true
    type: string
  scenario:
    type: string
  python-version:
    type: string
    default: "3.11"
  weather-year:
    type: int
    default: 2012
  solve-year:
    type: int
    default: 2035

outputs:
  scenario:
    description: Resolved scenario name used for export.
    value: ${{ steps.resolve.outputs.scenario }}
  system-json:
    description: Filename of the exported R2X system JSON.
    value: ${{ steps.resolve.outputs.system_json }}

runs:
  using: composite
  steps:
    - name: Resolve scenario name
      id: resolve
      shell: bash -le {0}
      env:
        INPUT_SCENARIO: ${{ inputs.scenario }}
        INPUT_RUN_PATH: ${{ inputs.reeds-run-path }}
      run: |
        scenario="${INPUT_SCENARIO}"
        if [ -z "$scenario" ]; then
          scenario="$(basename "$INPUT_RUN_PATH")"
        fi
        system_json="${scenario}_system.json"
        echo "scenario=$scenario" >> "$GITHUB_OUTPUT"
        echo "system_json=$system_json" >> "$GITHUB_OUTPUT"

    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: true
        restore-cache: true
        save-cache: true
        ignore-nothing-to-cache: true

    - name: Run R2X translation
      shell: bash -le {0}
      env:
        R2X_RUN_PATH: ${{ inputs.reeds-run-path }}
        R2X_SOLVE_YEAR: ${{ inputs.solve-year }}
        R2X_WEATHER_YEAR: ${{ inputs.weather-year }}
        R2X_SCENARIO: ${{ steps.resolve.outputs.scenario }}
        R2X_SYSTEM_JSON: ${{ steps.resolve.outputs.system_json }}
      run: |
        uv run --with "r2x-reeds>=0.3.5" python - <<'PY'
        import os
        from pathlib import Path

        from loguru import logger
        from r2x_core import DataStore, PluginContext
        from r2x_core.logger import setup_logging
        from r2x_reeds import ReEDSConfig, ReEDSParser

        run_path = Path(os.environ["R2X_RUN_PATH"]).expanduser().resolve()
        solve_year = int(os.environ["R2X_SOLVE_YEAR"])
        weather_year = int(os.environ["R2X_WEATHER_YEAR"])
        scenario = os.environ["R2X_SCENARIO"]
        system_json = os.environ["R2X_SYSTEM_JSON"]

        setup_logging()

        config = ReEDSConfig(
            weather_year=weather_year,
            solve_year=solve_year,
            scenario=scenario,
        )

        store = DataStore.from_plugin_config(config, path=run_path)
        ctx = PluginContext(config=config, store=store)
        parser = ReEDSParser.from_context(ctx)
        result_ctx = parser.run()
        result_ctx.system.to_json(system_json)
        logger.info("Built R2X system for scenario '{}' at '{}'", scenario, system_json)
        PY

    - name: Save R2X system
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: r2x-${{ steps.resolve.outputs.scenario }}
        compression-level: 9
        retention-days: 1
        path: ${{ steps.resolve.outputs.system_json }}

version: 2

updates:
  - package-ecosystem: "conda"
    directory: /
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
    reviewers:
      - "kennedy-mindermann"
    commit-message:
      prefix: "build"
      include: "scope"
    rebase-strategy: "auto"

  - package-ecosystem: "pip"
    directory: /
